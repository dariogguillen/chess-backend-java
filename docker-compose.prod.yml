# Production stack for chess-backend on AWS EC2.
#
# Differences from docker-compose.yml (local dev):
#   - No Postgres container: AWS RDS provides it. The app's
#     SPRING_DATASOURCE_URL points at the RDS endpoint (set via .env).
#   - Redis is still self-hosted (ElastiCache is not in the AWS Free Tier).
#     Volatile state is acceptable here: Redis only holds active room and
#     active game state; durable history goes to Postgres.
#   - The app port is bound to `127.0.0.1:8080:8080`, i.e. loopback only.
#     Caddy (running natively on the EC2 host) reverse-proxies HTTPS to
#     this port; the public internet cannot reach 8080 directly.
#   - All datasource credentials are read from `/opt/chess/.env` on the
#     EC2 (mode 600, owned by the `deploy` user). Never committed.
#
# Deployed manually in feature 7.5 via `scp` of the image tarball;
# replaced by an ECR `image:` reference in feature 7.7's CI/CD.

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  app:
    # The image reference is composed from two variables so neither default
    # contains a colon. Docker Compose v5.1.4 (the version that ships with
    # Docker 29.5.2 on Ubuntu 24.04) silently fails to substitute
    # `${VAR:-default}` when `default` itself contains a `:` — the parser
    # treats the inner colon as a separator and the variable stays at its
    # default. Splitting repo and tag dodges the bug.
    #
    # In CI/CD, the deploy workflow sets `APP_IMAGE_REPO` to the full ECR
    # repository URL (e.g. `546046686081.dkr.ecr.us-east-2.amazonaws.com/chess-backend`)
    # and `APP_IMAGE_TAG` to the commit SHA.
    #
    # With both unset, the composed default is `chess-backend:latest`, which
    # matches the image name the manual-deploy fallback in
    # `docs/deploy-runbook.md` produces.
    image: ${APP_IMAGE_REPO:-chess-backend}:${APP_IMAGE_TAG:-latest}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      # Auth bundle (features 16-20) env vars. AUTH_JWT_SECRET is mandatory —
      # boot fails fast without it via AuthProperties.Jwt compact constructor
      # (the HS256 256-bit minimum is enforced there). The OAuth values can be
      # placeholders until Google Cloud Console is set up; the OAuth flow only
      # fails at runtime if /oauth2/authorization/google is actually invoked.
      # AUTH_OAUTH_FRONTEND_REDIRECT_BASE has a localhost default in
      # application.yml but production should override it via .env so the OAuth
      # success handler redirects to the Cloudflare Pages frontend. All four are
      # read from /opt/chess/.env on the EC2 host.
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
      AUTH_OAUTH_FRONTEND_REDIRECT_BASE: ${AUTH_OAUTH_FRONTEND_REDIRECT_BASE}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET}
      # CORS allow-list override; if unset, application.yml's default
      # (https://chess-frontend-52i.pages.dev,http://localhost:*) applies.
      CHESS_CORS_ALLOWED_ORIGIN_PATTERNS: ${CHESS_CORS_ALLOWED_ORIGIN_PATTERNS:-}
    ports:
      - "127.0.0.1:8080:8080"
