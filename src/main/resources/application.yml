spring:
  application:
    name: chess
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/chess}
    username: ${SPRING_DATASOURCE_USERNAME:chess}
    password: ${SPRING_DATASOURCE_PASSWORD:chess}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  security:
    oauth2:
      client:
        registration:
          google:
            # Google OAuth 2.0 client credentials (feature 18 — auth-google-oauth). The OAuth flow is
            # disabled when these are blank because Spring Security skips registering an empty client;
            # production sets them via the GOOGLE_OAUTH_CLIENT_ID / GOOGLE_OAUTH_CLIENT_SECRET env
            # vars on the EC2 host. The test profile (application-test.yml) provides fake values so
            # the context loads even though the OAuth flow is never triggered against Google in tests.
            client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
            client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:}
            scope: openid, email, profile
            # {baseUrl} is a Spring Security template that resolves at runtime to the actual scheme +
            # host + port (e.g. https://chess-backend.duckdns.org or http://localhost:8080). DO NOT
            # hard-code the production URL here — the template lets the same artifact run in dev,
            # docker-compose, and prod without rebuilds.
            redirect-uri: '{baseUrl}/login/oauth2/code/google'
  jpa:
    hibernate:
      # Flyway is the source of truth for the schema. `validate` makes the JPA model
      # verify against the actual database at boot — if a future entity gains a column
      # that the migration forgets, the app refuses to start instead of silently
      # diverging. `update` (the seductive default) is the silent-drift footgun.
      ddl-auto: validate
    # Disable the open-in-view anti-pattern: keeping the JPA session open for the whole
    # request hides lazy-loading bugs in the view layer. Off here means every lazy access
    # outside a @Transactional service method fails loudly, which is what we want.
    open-in-view: false
    properties:
      hibernate.format_sql: true
  flyway:
    locations: classpath:db/migration
    # First migration ever in this codebase; no legacy schema to baseline against.
    # Leaving this false means an unexpected pre-existing schema fails the build rather
    # than being silently adopted.
    baseline-on-migrate: false

chess:
  redis:
    # TTL for active-state keys (room:{id}, game:{id}) in Redis. Every successful save
    # refreshes the TTL; reads do not. A game with no activity for this long self-cleans.
    # Accepts any Spring-relaxed Duration form: 24h, PT24H, 86400s, 1d.
    active-state-ttl: ${CHESS_REDIS_ACTIVE_STATE_TTL:24h}
  cors:
    # Single source of truth for the allowed-origin patterns of both REST (/api/**) and the
    # STOMP /ws handshake. Spring binds the comma-separated env-var string to List<String>
    # natively. Override in production without recompiling (e.g. to add a Vercel preview
    # origin) by setting CHESS_CORS_ALLOWED_ORIGIN_PATTERNS on the EC2 host.
    allowed-origin-patterns: ${CHESS_CORS_ALLOWED_ORIGIN_PATTERNS:https://chess-frontend-52i.pages.dev,http://localhost:*}
  disconnect:
    # How long the server waits after a player's STOMP DISCONNECT before mutating their game to
    # ABANDONED. A reconnect within this window cancels the timer. Accepts any Spring-relaxed
    # Duration form: 60s, PT60S, 1m, 200ms (the integration tests override to a short value via
    # @TestPropertySource so the timer fires in well under a second).
    grace-period: ${CHESS_DISCONNECT_GRACE_PERIOD:60s}
  bot:
    # Fairy-Stockfish subprocess integration (feature 23 — bot-opponent; strength model reworked in
    # feature 23.7 — bot-strength-fairy-stockfish). The bot thinks on a dedicated executor (NOT the
    # clock TaskScheduler) and feeds its move through the same applyMove pipeline a human move uses.
    # ITs run against a deterministic BotEngine double, so a green ./init.sh does NOT require the
    # binary; only the gated FairyStockfishEngineIT exercises the real adapter and skips when the
    # binary is absent.
    #
    # Absolute path to the Fairy-Stockfish binary. The default matches where the Dockerfile installs
    # the pinned binary it downloads from Fairy-Stockfish's GitHub releases (Fairy-Stockfish is not
    # in apt). Override locally (e.g. a Homebrew/manual install path) via CHESS_BOT_ENGINE_PATH to
    # run the gated FairyStockfishEngineIT.
    engine-path: ${CHESS_BOT_ENGINE_PATH:/usr/local/bin/fairy-stockfish}
    # Hard wall-clock deadline for the whole spawn -> search -> bestmove round-trip; the subprocess
    # is force-killed past it. The search is bounded by `go depth <d>` (Lichess's tier model), so this
    # is sized so even a top-tier `go depth 22` with classical eval finishes within it on a t3.micro.
    move-timeout: ${CHESS_BOT_MOVE_TIMEOUT:30s}
    # Size of the dedicated bot executor pool. Small fixed pool is plenty at portfolio scale.
    pool-size: ${CHESS_BOT_POOL_SIZE:2}
    # Target bot strength (Elo) applied to a BOT room created without an explicit botElo (feature
    # 23.5 — bot-difficulty). Must sit within the supported range (~400-3190); the BotProperties
    # compact constructor fails the boot fast if it does not. Internally mapped to a Fairy-Stockfish
    # (Skill Level, depth) pair by BotEloMapping. Override per environment via CHESS_BOT_DEFAULT_ELO.
    default-elo: ${CHESS_BOT_DEFAULT_ELO:1500}

auth:
  jwt:
    # HS256 shared secret. No default — feature 16's plan documents the fail-fast posture: a
    # production deploy without AUTH_JWT_SECRET set causes the AuthProperties compact constructor
    # to throw at bean-binding time, which is the desired behaviour (silent default secrets are
    # an auth footgun). The test profile (src/test/resources/application-test.yml) provides a
    # long-enough fixed secret so Testcontainers ITs can mint and verify tokens without touching
    # the environment; pom.xml's surefire+failsafe configs activate that profile for tests.
    secret: ${AUTH_JWT_SECRET:}
    # ^ The trailing ':' yields the empty string when the env var is unset; AuthProperties'
    #   compact constructor rejects empty / short secrets and surfaces a clear BeanCreationException
    #   on startup.
    # Token lifetime in seconds. 604800 = 7 days, the user-confirmed lifetime from the bundle-
    # level decisions in progress/current.md.
    expiry-seconds: ${AUTH_JWT_EXPIRY_SECONDS:604800}
  oauth:
    # Frontend base URL that the OAuth2 success handler (feature 18) redirects to after minting a
    # JWT. The handler appends `/auth/callback#token=<jwt>` (or `#error=<code>`) — the property must
    # NOT include a trailing slash and must NOT include the `/auth/callback` segment. Dev/local
    # default is the Vite dev server on port 5173; production sets
    # AUTH_OAUTH_FRONTEND_REDIRECT_BASE=https://chess-frontend-52i.pages.dev on the EC2 host. The
    # token is delivered in the URL fragment (not the query string) so it never reaches any
    # intermediate proxy's request log even if the proxy logs full URLs — fragments are not sent to
    # the server by the browser.
    frontend-redirect-base: ${AUTH_OAUTH_FRONTEND_REDIRECT_BASE:http://localhost:5173}

server:
  # Honor X-Forwarded-* headers (Proto, Host, For) when the app sits behind a
  # reverse proxy. Caddy in production sends X-Forwarded-Proto: https by default;
  # without this setting, Springdoc reports servers[0].url as http://... (the
  # inner request scheme) and the browser blocks Swagger UI "Try it out" as
  # mixed content. The `framework` strategy lets Spring's ForwardedHeaderFilter
  # rewrite the request URL. In local dev (no X-Forwarded-Proto header),
  # behavior is unchanged — Spring falls back to the actual request scheme.
  forward-headers-strategy: framework
