# Test-profile overrides. Activated by surefire and failsafe via
# -Dspring.profiles.active=test in pom.xml so every IT and unit test that boots a
# Spring context picks these settings up without per-test annotations.
#
# Two concerns live here today:
#   1. The auth-core (feature 16) JWT secret. dev and prod read AUTH_JWT_SECRET from the
#      environment; tests pin a deterministic value here so the JWTs minted by ITs verify
#      against the same key the JwtVerifier bean uses inside the running context. 64-character
#      ASCII string -> 64 bytes UTF-8, well above the 32-byte HS256 minimum the
#      AuthProperties.Jwt compact constructor enforces.
#   2. The auth-google-oauth (feature 18) fixture values. Spring Security's OAuth2 client
#      autoconfig binds `spring.security.oauth2.client.registration.google.*` at boot; a blank
#      client-id / client-secret would surface as a context-load failure on every existing IT.
#      We provide deterministic fake values that satisfy the binder without ever exercising the
#      OAuth flow against Google. `auth.oauth.frontend-redirect-base` is similarly pinned so the
#      OAuth2SuccessHandler IT can assert the exact Location header it builds.

spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-google-client-id
            client-secret: test-google-client-secret

auth:
  jwt:
    secret: test-secret-for-auth-core-it-only-do-not-use-in-prod-aaaaaaaaaaaa
  oauth:
    frontend-redirect-base: http://localhost:5173
