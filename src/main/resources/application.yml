spring:
  application:
    name: chess
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/chess}
    username: ${SPRING_DATASOURCE_USERNAME:chess}
    password: ${SPRING_DATASOURCE_PASSWORD:chess}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  jpa:
    hibernate:
      # Flyway is the source of truth for the schema. `validate` makes the JPA model
      # verify against the actual database at boot — if a future entity gains a column
      # that the migration forgets, the app refuses to start instead of silently
      # diverging. `update` (the seductive default) is the silent-drift footgun.
      ddl-auto: validate
    # Disable the open-in-view anti-pattern: keeping the JPA session open for the whole
    # request hides lazy-loading bugs in the view layer. Off here means every lazy access
    # outside a @Transactional service method fails loudly, which is what we want.
    open-in-view: false
    properties:
      hibernate.format_sql: true
  flyway:
    locations: classpath:db/migration
    # First migration ever in this codebase; no legacy schema to baseline against.
    # Leaving this false means an unexpected pre-existing schema fails the build rather
    # than being silently adopted.
    baseline-on-migrate: false

chess:
  redis:
    # TTL for active-state keys (room:{id}, game:{id}) in Redis. Every successful save
    # refreshes the TTL; reads do not. A game with no activity for this long self-cleans.
    # Accepts any Spring-relaxed Duration form: 24h, PT24H, 86400s, 1d.
    active-state-ttl: ${CHESS_REDIS_ACTIVE_STATE_TTL:24h}
  cors:
    # Single source of truth for the allowed-origin patterns of both REST (/api/**) and the
    # STOMP /ws handshake. Spring binds the comma-separated env-var string to List<String>
    # natively. Override in production without recompiling (e.g. to add a Vercel preview
    # origin) by setting CHESS_CORS_ALLOWED_ORIGIN_PATTERNS on the EC2 host.
    allowed-origin-patterns: ${CHESS_CORS_ALLOWED_ORIGIN_PATTERNS:https://chess-frontend-52i.pages.dev,http://localhost:*}
  disconnect:
    # How long the server waits after a player's STOMP DISCONNECT before mutating their game to
    # ABANDONED. A reconnect within this window cancels the timer. Accepts any Spring-relaxed
    # Duration form: 60s, PT60S, 1m, 200ms (the integration tests override to a short value via
    # @TestPropertySource so the timer fires in well under a second).
    grace-period: ${CHESS_DISCONNECT_GRACE_PERIOD:60s}

server:
  # Honor X-Forwarded-* headers (Proto, Host, For) when the app sits behind a
  # reverse proxy. Caddy in production sends X-Forwarded-Proto: https by default;
  # without this setting, Springdoc reports servers[0].url as http://... (the
  # inner request scheme) and the browser blocks Swagger UI "Try it out" as
  # mixed content. The `framework` strategy lets Spring's ForwardedHeaderFilter
  # rewrite the request URL. In local dev (no X-Forwarded-Proto header),
  # behavior is unchanged — Spring falls back to the actual request scheme.
  forward-headers-strategy: framework
